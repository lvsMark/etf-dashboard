<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETF Outstanding Units Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;min-height:100vh}

/* HEADER */
.header{background:#161b22;border-bottom:1px solid #30363d;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.header h1{font-size:15px;font-weight:700;color:#f0f6fc;white-space:nowrap}
.header .meta{color:#8b949e;font-size:11px}

/* CONTROLS */
.controls{background:#161b22;border-bottom:1px solid #30363d;padding:8px 16px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.ctrl-group{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.ctrl-label{color:#8b949e;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;margin-right:3px;white-space:nowrap}
.btn{background:transparent;border:1px solid #30363d;color:#8b949e;padding:3px 9px;border-radius:4px;cursor:pointer;font-size:11px;font-weight:500;transition:all .15s;white-space:nowrap}
.btn:hover{border-color:#58a6ff;color:#58a6ff}
.btn.active{background:#1f6feb;border-color:#1f6feb;color:#fff}

/* TABS */
.tab-bar{display:flex;background:#161b22;border-bottom:1px solid #30363d;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:10px 14px;cursor:pointer;font-size:12px;font-weight:500;color:#8b949e;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;flex-shrink:0}
.tab-btn:hover{color:#e6edf3}
.tab-btn.active{color:#f0f6fc;border-bottom-color:#1f6feb}

/* CONTENT */
.tab-pane{display:none;padding:14px 16px}
.tab-pane.active{display:block}
.section-title{font-size:10px;font-weight:700;color:#8b949e;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;margin-top:2px}

/* COMBINED CHART — flexible height, adapts to viewport */
.combined-wrap{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px;margin-bottom:16px;position:relative}
.combined-wrap canvas{width:100%!important;height:clamp(220px,38vh,440px)}

/* GRID */
.etf-grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
.etf-card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px}
.card-header{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.card-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.card-name{font-size:12px;font-weight:600;color:#e6edf3}
.card-stats{font-size:11px;color:#8b949e;margin-bottom:8px;display:flex;gap:10px;flex-wrap:wrap}
.card-stats .val{color:#e6edf3;font-weight:500}
.up{color:#3fb950}.down{color:#f85149}
/* Individual ETF charts — standard 16:9 on all screen sizes */
.etf-card canvas{width:100%!important;aspect-ratio:16/9}

/* MOBILE */
@media(max-width:600px){
  .etf-grid{grid-template-columns:1fr}
}
@media(min-width:601px) and (max-width:900px){
  .etf-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<div class="header">
  <h1>📊 ETF Outstanding Units</h1>
  <div class="meta">Updated: 2026-06-16</div>
</div>

<div class="controls">
  <div class="ctrl-group">

    <button class="btn" data-tf="1W">1W</button>

    <button class="btn" data-tf="3M">3M</button>
    <button class="btn" data-tf="6M">6M</button>
    <button class="btn" data-tf="YTD">YTD</button>
    <button class="btn active" data-tf="1Y">1Y</button>

    <button class="btn" data-tf="MAX">MAX</button>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">Scale</span>
    <button class="btn active" data-scale="units">Units</button>
    <button class="btn" data-scale="rebase">Rebase 100</button>
  </div>
</div>

<div class="tab-bar" id="tabBar"></div>

.7596, 333.3053, 335.0559, 329.9431, 332.0227, 326.829, 338.6589, 336.0342, 335.2422, 336.4847, 338.4557, 393.2819, 400.1624, 391.1116, 383.3041, 400.0074, 400.2497, 386.3528, 366.4434, 338.4811, 336.5693, 330.6561, 327.4394, 296.3062, 299.8508, 293.9207, 303.7757, 297.7165, 277.3808, 278.1371, 282.9484, 277.1584]};
const TABS = [{"id": "commodity", "label": "Commodity", "etfs": [{"key": "GLD", "label": "Gold (GLD)", "color": "#FFD700"}, {"key": "SLV", "label": "Silver (SLV)", "color": "#A8A8A8"}, {"key": "USO", "label": "Crude Oil (USO)", "color": "#FF8C00"}, {"key": "IBIT", "label": "Bitcoin (IBIT)", "color": "#F7931A"}, {"key": "ETHA", "label": "Ethereum (ETHA)", "color": "#627EEA"}]}, {"id": "fixed", "label": "Fixed Income", "etfs": [{"key": "MMFA", "label": "MMF AUM (MMFA)", "color": "#00C853"}, {"key": "TLT", "label": "20+ Treasury (TLT)", "color": "#2196F3"}, {"key": "HYG", "label": "High Yield Corp (HYG)", "color": "#F44336"}, {"key": "LQD", "label": "Inv Grade Bond (LQD)", "color": "#00BCD4"}]}, {"id": "regional", "label": "Regional", "etfs": [{"key": "SPY", "label": "S&P (SPY)", "color": "#1565C0"}, {"key": "QQQ", "label": "Nasdaq (QQQ)", "color": "#1E88E5"}, {"key": "KWEB", "label": "China Internet (KWEB)", "color": "#E53935"}, {"key": "MCHI", "label": "MSCI China (MCHI)", "color": "#EF5350"}, {"key": "T2800", "label": "Tracker (2800)", "color": "#B71C1C"}, {"key": "T1329", "label": "Nikkei (1329)", "color": "#FF6F00"}, {"key": "EWJ", "label": "MSCI JP (EWJ)", "color": "#FFA726"}, {"key": "EWY", "label": "MSCI Korea (EWY)", "color": "#7B1FA2"}, {"key": "EWT", "label": "MSCI Taiwan (EWT)", "color": "#9C27B0"}, {"key": "EWS", "label": "MSCI Singapore (EWS)", "color": "#00897B"}, {"key": "EWA", "label": "MSCI Australia (EWA)", "color": "#26A69A"}, {"key": "EZU", "label": "MSCI Europe (EZU)", "color": "#558B2F"}, {"key": "INDA", "label": "MSCI India (INDA)", "color": "#FF7043"}]}, {"id": "ussector", "label": "US Sector", "etfs": [{"key": "IWM", "label": "Russel (IWM)", "color": "#1565C0"}, {"key": "XLY", "label": "US Consumer (XLY)", "color": "#1E88E5"}, {"key": "XLP", "label": "US Staples (XLP)", "color": "#43A047"}, {"key": "XLC", "label": "US Comm Service (XLC)", "color": "#00ACC1"}, {"key": "XLE", "label": "US Energy (XLE)", "color": "#F4511E"}, {"key": "XOP", "label": "US Oil (XOP)", "color": "#FF7043"}, {"key": "XLF", "label": "US Financials (XLF)", "color": "#8E24AA"}, {"key": "XLV", "label": "US Health (XLV)", "color": "#E53935"}, {"key": "XLI", "label": "US Industrial (XLI)", "color": "#6D4C41"}, {"key": "XLRE", "label": "US Property (XLRE)", "color": "#FB8C00"}, {"key": "XLU", "label": "US Utilities (XLU)", "color": "#00897B"}, {"key": "ITA", "label": "US AeroSpace (ITA)", "color": "#546E7A"}, {"key": "XLK", "label": "US Technology (XLK)", "color": "#3949AB"}, {"key": "SOXX", "label": "US Semi (SOXX)", "color": "#039BE5"}]}, {"id": "china", "label": "China", "etfs": [{"key": "T2800", "label": "Tracker (2800)", "color": "#B71C1C"}, {"key": "T3067", "label": "iShares HSTECH (3067)", "color": "#E53935"}, {"key": "T3033", "label": "CSOP HSTECH (3033)", "color": "#EF5350"}, {"key": "T3110", "label": "HK High Yield (3110)", "color": "#FF7043"}, {"key": "T2828", "label": "HS China (2828)", "color": "#FF8A65"}]}];

let tf = '1Y', scale = 'units';
const charts = {};

function getStartIdx(tf) {
  const last = new Date(DATES[DATES.length-1]);
  let start;
  if(tf==='MAX') start = new Date('2000-01-01');
  else if(tf==='1W') start = new Date(last-7*864e5);
  else if(tf==='1M') start = new Date(last-30*864e5);
  else if(tf==='3M') start = new Date(last-91*864e5);
  else if(tf==='6M') start = new Date(last-182*864e5);
  else if(tf==='YTD') start = new Date(last.getFullYear(),0,1);
  else if(tf==='1Y') start = new Date(last-365*864e5);
  else if(tf==='3Y') start = new Date(last-3*365*864e5);
  let idx = 0;
  for(let i=0;i<DATES.length;i++){ if(new Date(DATES[i])>=start){idx=i;break;} }
  return idx;
}

function getSeries(key, startIdx) {
  const raw = RAW[key];
  if(!raw) return [];
  const vals = raw.slice(startIdx);
  if(scale==='units') return vals;
  let base = null;
  for(const v of vals){ if(v!==null&&v!==undefined){base=v;break;} }
  if(!base) return vals;
  return vals.map(v=>v===null?null:+(v/base*100).toFixed(3));
}

function thinLabels(startIdx) {
  const labels = DATES.slice(startIdx);
  const step = Math.max(1, Math.floor(labels.length/120));
  return labels.map((l,i)=>i%step===0?l:'');
}

function fmtVal(v,key) {
  if(v===null||v===undefined) return 'N/A';
  if(key==='MMFA') return '$'+v.toFixed(0)+'B';
  return v.toFixed(1)+'M';
}
function fmtPct(a,b) {
  if(!a||!b) return '';
  const p=((b-a)/a*100);
  return `<span class="${p>=0?'up':'down'}">${p>=0?'+':''}${p.toFixed(1)}%</span>`;
}

function makeDataset(etf, vals) {
  return {
    label: etf.label,
    data: vals,
    borderColor: etf.color,
    backgroundColor: etf.color+'18',
    borderWidth: 1.5,
    pointRadius: 0,
    pointHoverRadius: 3,
    tension: 0.1,
    spanGaps: true,
    fill: false
  };
}

const baseOptions = (showLegend) => ({
  responsive: true,
  maintainAspectRatio: false,
  animation: false,
  interaction: {mode:'index',intersect:false},
  plugins: {
    legend: {
      display: showLegend,
      labels: {color:'#8b949e',boxWidth:10,padding:10,font:{size:10}},
      position: 'top'
    },
    tooltip: {
      backgroundColor:'#1c2128',borderColor:'#30363d',borderWidth:1,
      titleColor:'#8b949e',bodyColor:'#e6edf3',padding:8,
      callbacks: {label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y!==null?ctx.parsed.y.toFixed(2):'N/A'}`}
    }
  },
  scales: {
    x: {type:'category',ticks:{color:'#8b949e',maxTicksLimit:6,maxRotation:0,font:{size:9}},grid:{color:'#21262d'},border:{color:'#30363d'}},
    y: {ticks:{color:'#8b949e',maxTicksLimit:5,font:{size:9}},grid:{color:'#21262d'},border:{color:'#30363d'}}
  }
});

function renderChart(id, labels, datasets, showLegend) {
  const canvas = document.getElementById(id);
  if(!canvas) return;
  if(charts[id]) {
    charts[id].data.labels = labels;
    charts[id].data.datasets = datasets;
    charts[id].update('none');
  } else {
    charts[id] = new Chart(canvas, {
      type:'line',
      data:{labels,datasets},
      options: baseOptions(showLegend)
    });
  }
}

function renderAll() {
  const si = getStartIdx(tf);
  const labels = thinLabels(si);

  TABS.forEach(tab => {
    // Combined
    const cds = tab.etfs.map(e => makeDataset(e, getSeries(e.key, si)));
    renderChart('cmb-'+tab.id, labels, cds, true);

    // Individual
    tab.etfs.forEach(etf => {
      const vals = getSeries(etf.key, si);
      const raw = RAW[etf.key]||[];
      // Stats
      const rawSlice = raw.slice(si);
      let first=null,last=null;
      for(const v of rawSlice){if(v!==null){first=v;break;}}
      for(let i=rawSlice.length-1;i>=0;i--){if(rawSlice[i]!==null){last=rawSlice[i];break;}}
      const el = document.getElementById('stats-'+tab.id+'-'+etf.key);
      if(el) el.innerHTML = `<span class="val">${fmtVal(last,etf.key)}</span> ${fmtPct(first,last)}`;

      const ds = [{...makeDataset(etf,vals),fill:true,backgroundColor:etf.color+'20'}];
      renderChart('c-'+tab.id+'-'+etf.key, labels, ds, false);
    });
  });
}

// Build DOM
const barEl = document.getElementById('tabBar');
const panesEl = document.getElementById('tabPanes');

TABS.forEach((tab,i) => {
  const btn = document.createElement('div');
  btn.className='tab-btn'+(i===0?' active':'');
  btn.textContent=tab.label;
  btn.dataset.tab=tab.id;
  barEl.appendChild(btn);

  const pane = document.createElement('div');
  pane.className='tab-pane'+(i===0?' active':'');
  pane.id='pane-'+tab.id;

  let html = `<div class="section-title">All ${tab.label} ETFs</div>
<div class="combined-wrap"><canvas id="cmb-${tab.id}"></canvas></div>
<div class="section-title">Individual ETFs</div>
<div class="etf-grid">`;

  tab.etfs.forEach(etf => {
    html += `<div class="etf-card">
  <div class="card-header"><span class="card-dot" style="background:${etf.color}"></span><span class="card-name">${etf.label}</span></div>
  <div class="card-stats" id="stats-${tab.id}-${etf.key}"></div>
  <canvas id="c-${tab.id}-${etf.key}"></canvas>
</div>`;
  });
  html += '</div>';
  pane.innerHTML = html;
  panesEl.appendChild(pane);
});

// Tab switching
barEl.addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if(!btn) return;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('pane-'+btn.dataset.tab).classList.add('active');
});

// Controls
document.querySelectorAll('[data-tf]').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('[data-tf]').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); tf=b.dataset.tf; renderAll();
  });
});
document.querySelectorAll('[data-scale]').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('[data-scale]').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); scale=b.dataset.scale; renderAll();
  });
});

renderAll();
</script>
